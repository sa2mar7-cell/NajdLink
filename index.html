<style>
/* 1. حقن لوحة الألوان الإمبراطورية الصارمة داخل النظام */
:root {
    --royal-imperial-green: #005A36 !important; /* الأخضر الملكي الأسطوري */
    --polished-gold-metallic: #D5B87D !important; /* الذهب المصقول النخبوي */
    --deep-charcoal-canvas: #1E232A !important; /* الخلفية الفخمة المعتمة */
    --sovereign-glow-neon: #00ff9d !important; /* التوهج الخفيف الذكي */
}

/* 2. تصحيح أرضية الموقع بالكامل */
html, body {
    background-color: var(--deep-charcoal-canvas) !important;
}

/* 3. معالجة وتغيير البادجات (التي تظهر باللون الفيروزي أو النيلي الباهت حالياً) */
div[style*="background-color: rgb(24,"], 
div[style*="background-color"], 
[class*="badge"], 
span[style*="color"],
div[style*="color: rgb(0, 229"] {
    background-color: rgba(0, 90, 54, 0.25) !important; /* أرضية خضراء ملكية شفافة */
    border: 1px solid var(--royal-imperial-green) !important; /* حدود خضراء مصمتة */
    color: var(--polished-gold-metallic) !important; /* نصوص تشع بالذهب المصقول */
    box-shadow: 0 0 10px rgba(0, 255, 157, 0.1) !important; /* التوهج الخفيف المحيط بالبادج */
}

/* 4. معالجة صور الـ CMS والـ Industrial Gateways لتفعيل تأثير تلاشي الـ 2.5 ثانية */
div[class*="framer"] img, 
div[class*="Collection"] img, 
div[class*="Grid"] img, 
.industrial-gateways img,
img {
    border-radius: 20px !important; /* تدوير حواف الصور الحادة الحالية بشكل فاخر */
    opacity: 0.35 !important; /* الصورة متلاشية وضبابية افتراضياً لتندمج مع عمق الظلام */
    filter: grayscale(45%) contrast(110%) brightness(85%) !important;
    
    /* المحرك الزمني: حركة انتقال سحرية ناعمة وممتدة على مدار ثانيتين ونصف */
    transition: all 2.5s cubic-bezier(0.25, 1, 0.5, 1) !important;
    will-change: opacity, transform, filter;
}

/* 5. تأثير الـ Hover (عند تحريك الماوس فوق الكرت أو فوق أي صورة) */
/* هنا تنبثق الصورة من التلاشي والرمادي لتظهر بكامل ألوانها وسطوعها ببطء أسطوري */
div[class*="framer"]:hover img, 
div[class*="CollectionItem"]:hover img,
div[class*="Grid"] > div:hover img,
div:hover > img,
img:hover {
    opacity: 1 !important; /* الخروج التام من التلاشي لسطوع كامل 100% */
    filter: grayscale(0%) contrast(125%) brightness(100%) !important; /* عودة الألوان السيادية الكاملة */
    transform: scale(1.04) !important; /* تقريب وزووم تنفسي هادئ وبطيء جداً ممتد لـ 2.5 ثانية */
}

/* 6. إضاءة حواف الكروت بالكامل بالتوهج الإمبراطوري المتناسق */
div[class*="CollectionItem"], 
div[class*="framer-"] > div[style*="border"],
div[style*="border-radius"] {
    transition: all 2.5s cubic-bezier(0.25, 1, 0.5, 1) !important;
}

div[class*="CollectionItem"]:hover, 
div[class*="framer-"]:hover,
div[style*="border-radius"]:hover {
    border-color: var(--royal-imperial-green) !important;
    /* توهج ملكي خفيف خافت وثري يشع أسفل ومحيط الكروت عند التفاعل */
    box-shadow: 0 25px 55px rgba(0, 90, 54, 0.35), 0 0 15px rgba(213, 184, 125, 0.08) !important;
    transform: translateY(-5px) !important; /* رفع الكرت للأعلى بشكل انسيابي */
}
</style>
